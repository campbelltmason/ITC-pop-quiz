  `;
  main.querySelectorAll('.level-card').forEach(btn=>{
    btn.addEventListener('click', ()=> renderModuleSelect(parseInt(btn.dataset.level)));
  });
}

/* ============================= SCREEN: MODULE SELECT ============================= */
function renderModuleSelect(level){
  state.level = level;
  state.moduleKey = null;
  const levelName = ['','LEVEL ONE','LEVEL TWO','LEVEL THREE'][level];
  setNav({
    showHome:true, showModules:false,
    crumb: `<span class="crumb-chip">${levelName}</span>`
  });

  let cards = '';
  Object.keys(MODULES).forEach(key=>{
    const count = questionsUpTo(level, key).length;
    if(count === 0) return;
    cards += `
      <button class="module-card" data-module="${key}">
        <div>
          <div class="module-name">${MODULES[key].name}</div>
          <div class="module-count">${MODULES[key].desc} · ${count} question${count===1?'':'s'}</div>
        </div>
        <div class="module-go">Start</div>
      </button>
    `;
  });

  const totalCount = questionsUpTo(level,'all').length;

  main.innerHTML = `
    <div class="screen">
      <div class="section-title">Choose a <em>module.</em></div>
      <div class="section-sub">Or run a mixed set pulling from everything you're responsible for at this level.</div>
      <div class="module-grid">
        <button class="module-card mixed" data-module="all">
          <div>
            <div class="module-name">Mixed Quiz — All Modules</div>
            <div class="module-count">Everything tagged for ${levelName.toLowerCase()} · ${totalCount} questions</div>
          </div>
          <div class="module-go">Start</div>
        </button>
        ${cards}
      </div>
    </div>
  `;

  main.querySelectorAll('.module-card').forEach(btn=>{
    btn.addEventListener('click', ()=> startQuiz(level, btn.dataset.module));
  });
}

/* ============================= SCREEN: QUIZ ============================= */
function startQuiz(level, moduleKey){
  state.moduleKey = moduleKey;
  const pool = shuffle(questionsUpTo(level, moduleKey));
  state.pool = pool;
  state.idx = 0;
  state.correct = 0;
  state.missed = [];
  renderQuestion();
}

function levelChip(level){
  return ['','LEVEL ONE','LEVEL TWO','LEVEL THREE'][level];
}

function renderQuestion(){
  state.answered = false;
  const q = state.pool[state.idx];
  const total = state.pool.length;
  const pct = Math.round((state.idx/total)*100);
  const letters = ['A','B','C','D'];

  setNav({
    showHome:true, showModules:true,
    crumb: `<span class="crumb-chip">${levelChip(state.level)}</span><span class="crumb-sep">/</span><span class="crumb-chip grey">${MODULES[q.module].name}</span>`
  });

  main.innerHTML = `
    <div class="screen">
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">${state.idx+1} / ${total}</div>
        <div class="score-chip">${state.correct} correct</div>
      </div>
      <div class="q-tag">${MODULES[q.module].name} · Level ${q.level}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="options">
        ${q.options.map((opt,i)=>`
          <button class="opt" data-i="${i}">
            <span class="letter">${letters[i]}</span><span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="next-row"><button class="btn" id="nextBtn">${state.idx+1===total ? 'See Results' : 'Next Question'}</button></div>
    </div>
  `;

  const optButtons = main.querySelectorAll('.opt');
  optButtons.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(state.answered) return;
      state.answered = true;
      const chosen = parseInt(btn.dataset.i);
      const isCorrect = chosen === q.answer;
      if(isCorrect) state.correct++;
      else state.missed.push(q);

      optButtons.forEach(b=>{
        b.disabled = true;
        const bi = parseInt(b.dataset.i);
        if(bi === q.answer) b.classList.add('correct');
        else if(bi === chosen) b.classList.add('incorrect');
      });

      const fb = document.getElementById('feedback');
      fb.classList.add('show', isCorrect ? 'right' : 'wrong');
      fb.innerHTML = `<b>${isCorrect ? "Nice — that's right." : "Not quite."}</b><br>${q.note}`;

      document.getElementById('nextBtn').classList.add('show');
    });
  });

  document.getElementById('nextBtn').addEventListener('click', ()=>{
    if(state.idx+1 < state.pool.length){
      state.idx++;
      renderQuestion();
    } else {
      renderResults();
    }
  });
}

/* ============================= SCREEN: RESULTS ============================= */
function renderResults(){
  const total = state.pool.length;
  const pct = Math.round((state.correct/total)*100);
  let verdict, sub;
  if(pct === 100){ verdict = "Perfect Run"; sub = "Full marks — nothing left on the table."; }
  else if(pct >= 80){ verdict = "Strong Lap"; sub = "Solid knowledge — a couple of gaps to tidy up."; }
  else if(pct >= 60){ verdict = "On The Right Line"; sub = "Getting there — worth another pass through the missed ones."; }
  else { verdict = "Back To The Nursery Slope"; sub = "Good starting point — revisit this module before your next session."; }

  setNav({
    showHome:true, showModules:true,
    crumb: `<span class="crumb-chip">${levelChip(state.level)}</span><span class="crumb-sep">/</span><span class="crumb-chip grey">Results</span>`
  });

  main.innerHTML = `
    <div class="screen">
      <div class="result-wrap">
        <img class="result-logo" src="${LOGO_BADGE}" alt="ITC badge">
        <div class="result-marker">${pct}%</div>
        <div class="result-title">${verdict}</div>
        <div class="result-sub">${sub}</div>
        <div class="result-stats">
          <div class="stat"><div class="stat-num">${state.correct}</div><div class="stat-label">Correct</div></div>
          <div class="stat"><div class="stat-num">${total-state.correct}</div><div class="stat-label">Missed</div></div>
          <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
        </div>
        <div class="result-actions">
          <button class="btn show" id="retryBtn">Retry This Set</button>
          <button class="btn ghost show" id="modulesBtnResult">Choose Another Module</button>
          <button class="btn ghost show" id="levelBtn">Change Level</button>
        </div>
        ${state.missed.length ? `
          <div class="missed-list">
            <div class="missed-title">Review — ${state.missed.length} missed</div>
            ${state.missed.map(m => `
              <div class="missed-item">
                <div class="mq">${m.q}</div>
                <div class="ma">Correct answer: ${m.options[m.answer]}</div>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    </div>
  `;

  document.getElementById('retryBtn').addEventListener('click', ()=>{
    state.pool = shuffle(state.pool);
    state.idx = 0; state.correct = 0; state.missed = [];
    renderQuestion();
  });
  document.getElementById('modulesBtnResult').addEventListener('click', ()=> renderModuleSelect(state.level));
  document.getElementById('levelBtn').addEventListener('click', ()=> renderLevelSelect());
}

/* ============================= INIT ============================= */
renderLevelSelect();
</script>
</body>
</html>
