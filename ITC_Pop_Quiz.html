<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITC Pop Quiz</title>
<style>
  @import url('https://fonts.cdnfonts.com/css/bebas-neue');

  :root{
    --red:#D62027;
    --red-dark:#a8181d;
    --black:#111111;
    --white:#ffffff;
    --snow:#F6F6F4;
    --panel:#ffffff;
    --ink:#171717;
    --grey:#5b5f63;
    --grey-light:#8a8e92;
    --line:#e3e3e0;
    --good:#1c8a4d;
    --good-bg:#eaf7ef;
    --bad:#c22b2b;
    --bad-bg:#fdecec;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background:var(--snow);
    color:var(--ink);
    min-height:100vh;
  }

  .app{
    max-width:780px;
    margin:0 auto;
    min-height:100vh;
    display:flex; flex-direction:column;
    background:var(--snow);
  }

  /* ---------------- HEADER ---------------- */
  header.top{
    background:var(--black);
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px;
    position:sticky; top:0; z-index:10;
    border-bottom:4px solid var(--red);
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .badge-img{width:44px; height:44px; border-radius:50%; display:block; background:#fff; border:2px solid #fff; box-shadow:0 0 0 2px var(--red);}
  .brand-text{font-family:'Bebas Neue', sans-serif; color:#fff; font-size:22px; letter-spacing:1.5px; line-height:1;}
  .brand-text span{color:var(--red);}
  .brand-sub{font-size:10px; letter-spacing:2px; color:#9a9a9a; text-transform:uppercase; margin-top:3px;}

  .nav-actions{display:flex; gap:8px;}
  .nav-btn{
    background:none; border:1px solid #3a3a3a; color:#e8e8e8;
    font-size:11px; letter-spacing:.8px; text-transform:uppercase;
    padding:8px 13px; border-radius:20px; cursor:pointer; transition:.15s;
    display:none;
    white-space:nowrap;
  }
  .nav-btn.show{display:inline-block;}
  .nav-btn:hover{border-color:var(--red); background:#1c1c1c;}

  /* ---------------- SUB CRUMB BAR (module/quiz screens) ---------------- */
  .crumb-bar{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:14px 24px; background:var(--white); border-bottom:1px solid var(--line);
  }
  .crumb-chip{
    font-size:11px; letter-spacing:1px; text-transform:uppercase; font-weight:700;
    color:var(--red); background:#fdeaea; padding:5px 10px; border-radius:14px;
  }
  .crumb-chip.grey{color:var(--grey); background:#eeeeec;}
  .crumb-sep{color:var(--grey-light); font-size:12px;}

  main{flex:1; padding:32px 24px 60px; display:flex; flex-direction:column;}

  .screen{animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  /* ---------------- LEVEL SELECT ---------------- */
  .hero-logo-row{display:flex; justify-content:center; margin-bottom:22px;}
  .hero-logo-row img{width:96px; height:96px; border-radius:50%; box-shadow:0 6px 18px rgba(0,0,0,.12);}

  .hero-line{
    font-family:'Bebas Neue', sans-serif;
    font-size:clamp(32px,7vw,48px);
    line-height:1.02; letter-spacing:0.5px;
    text-align:center; margin-bottom:10px; color:var(--black);
  }
  .hero-line em{font-style:normal; color:var(--red);}
  .hero-sub{
    color:var(--grey); font-size:15.5px; line-height:1.55;
    max-width:46ch; margin:0 auto 36px; text-align:center;
  }

  .level-grid{display:grid; gap:16px;}
  .level-card{
    display:flex; align-items:center; gap:18px;
    background:var(--panel);
    border:2px solid var(--line);
    border-radius:12px;
    padding:20px 22px;
    cursor:pointer; text-align:left;
    transition:.16s;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .level-card:hover{border-color:var(--red); box-shadow:0 6px 18px rgba(214,32,39,.14); transform:translateY(-2px);}
  .level-marker{flex-shrink:0; width:48px; height:48px; display:flex; align-items:center; justify-content:center;}
  .marker-shape{display:block; box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .lvl1 .marker-shape{width:34px; height:34px; border-radius:50%; background:#2E9E4F;}
  .lvl2 .marker-shape{width:30px; height:30px; background:#1E6FD9;}
  .lvl3 .marker-shape{width:26px; height:26px; transform:rotate(45deg); background:#111111;}

  .level-card-text{flex:1;}
  .level-kicker{font-size:10px; letter-spacing:2px; color:var(--red); text-transform:uppercase; font-weight:800; margin-bottom:3px;}
  .level-title{font-family:'Bebas Neue', sans-serif; font-size:25px; letter-spacing:0.5px; color:var(--black);}
  .level-desc{color:var(--grey); font-size:13.5px; margin-top:4px; line-height:1.4;}
  .level-arrow{color:var(--grey-light); font-size:22px; flex-shrink:0; font-weight:700;}
  .level-card:hover .level-arrow{color:var(--red);}

  /* ---------------- MODULE SELECT ---------------- */
  .section-title{font-family:'Bebas Neue', sans-serif; font-size:clamp(28px,6vw,38px); letter-spacing:0.5px; color:var(--black); margin-bottom:8px;}
  .section-title em{font-style:normal; color:var(--red);}
  .section-sub{color:var(--grey); font-size:15px; margin-bottom:28px; line-height:1.5;}

  .module-grid{display:grid; grid-template-columns:1fr; gap:14px;}
  .module-card{
    background:var(--panel); border:2px solid var(--line); border-radius:12px;
    padding:18px 20px; cursor:pointer; transition:.16s;
    display:flex; justify-content:space-between; align-items:center; gap:14px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .module-card:hover{border-color:var(--red); box-shadow:0 6px 18px rgba(214,32,39,.14); transform:translateY(-2px);}
  .module-name{font-family:'Bebas Neue', sans-serif; font-size:21px; letter-spacing:.5px; color:var(--black);}
  .module-count{font-size:12.5px; color:var(--grey); margin-top:4px; line-height:1.4;}
  .module-go{
    font-size:11px; letter-spacing:1px; text-transform:uppercase; font-weight:700;
    color:#fff; background:var(--red); border-radius:20px;
    padding:8px 16px; flex-shrink:0; white-space:nowrap;
  }
  .module-card.mixed{background:#fff5f5; border-color:#f3c9c9;}

  /* ---------------- QUIZ ---------------- */
  .progress-row{display:flex; align-items:center; gap:12px; margin-bottom:26px;}
  .progress-track{flex:1; height:8px; background:var(--line); border-radius:5px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--red); border-radius:5px; transition:width .3s ease;}
  .progress-label{font-size:12.5px; color:var(--grey); white-space:nowrap; font-weight:600;}
  .score-chip{font-size:12px; color:var(--ink); background:#fff; border:1px solid var(--line); padding:5px 11px; border-radius:14px; white-space:nowrap; font-weight:600;}

  .q-tag{font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--red); font-weight:800; margin-bottom:10px;}
  .q-text{font-size:clamp(20px,3.6vw,25px); line-height:1.35; font-weight:700; margin-bottom:26px; color:var(--black);}

  .options{display:flex; flex-direction:column; gap:10px;}
  .opt{
    text-align:left; background:var(--panel); border:2px solid var(--line); color:var(--ink);
    padding:15px 18px; border-radius:10px; font-size:15.5px; cursor:pointer; transition:.14s;
    display:flex; align-items:center; gap:12px;
  }
  .opt:hover{border-color:#c7c7c3; background:#fcfcfb;}
  .opt .letter{
    width:28px; height:28px; border-radius:50%; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:12.5px; font-weight:700; color:var(--grey); flex-shrink:0;
  }
  .opt.correct{border-color:var(--good); background:var(--good-bg);}
  .opt.correct .letter{background:var(--good); border-color:var(--good); color:#fff;}
  .opt.incorrect{border-color:var(--bad); background:var(--bad-bg);}
  .opt.incorrect .letter{background:var(--bad); border-color:var(--bad); color:#fff;}
  .opt[disabled]{cursor:default;}
  .opt:disabled:not(.correct):not(.incorrect){opacity:.5;}

  .feedback{
    margin-top:20px; padding:16px 18px; border-radius:10px; background:#fff;
    border-left:4px solid var(--grey-light); font-size:14.5px; line-height:1.55; color:var(--ink);
    display:none; box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .feedback.show{display:block; animation:fadeIn .25s ease;}
  .feedback.right{border-left-color:var(--good);}
  .feedback.wrong{border-left-color:var(--bad);}
  .feedback b{color:var(--black);}

  .next-row{margin-top:24px; display:flex; justify-content:flex-end;}
  .btn{
    background:var(--red); color:#fff; border:none;
    font-family:'Bebas Neue', sans-serif; letter-spacing:1px; font-size:17px;
    padding:13px 28px; border-radius:8px; cursor:pointer; display:none;
  }
  .btn:hover{background:var(--red-dark);}
  .btn.show{display:inline-block; animation:fadeIn .25s ease;}

  /* ---------------- RESULTS ---------------- */
  .result-wrap{text-align:center; padding-top:10px;}
  .result-logo{width:64px; height:64px; border-radius:50%; margin:0 auto 18px; box-shadow:0 4px 14px rgba(0,0,0,.12);}
  .result-marker{
    width:96px; height:96px; margin:0 auto 22px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue', sans-serif; font-size:30px; color:#fff;
    background:var(--red); border:4px solid var(--black);
  }
  .result-title{font-family:'Bebas Neue', sans-serif; font-size:38px; letter-spacing:1px; margin-bottom:8px; color:var(--black);}
  .result-sub{color:var(--grey); font-size:14.5px; margin-bottom:34px;}
  .result-stats{display:flex; gap:12px; justify-content:center; margin-bottom:34px; flex-wrap:wrap;}
  .stat{background:var(--panel); border:2px solid var(--line); border-radius:12px; padding:16px 24px; min-width:100px;}
  .stat-num{font-family:'Bebas Neue', sans-serif; font-size:32px; color:var(--red);}
  .stat-label{font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--grey); margin-top:2px; font-weight:700;}
  .result-actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
  .btn.ghost{background:#fff; border:2px solid var(--line); color:var(--ink); display:inline-block;}
  .btn.ghost:hover{border-color:var(--black); background:var(--snow);}

  .missed-list{text-align:left; margin-top:44px; border-top:2px solid var(--line); padding-top:24px;}
  .missed-title{font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--grey); margin-bottom:16px; font-weight:800;}
  .missed-item{background:#fff; border:2px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:10px; font-size:13.5px; line-height:1.5;}
  .missed-item .mq{color:var(--black); font-weight:700; margin-bottom:6px;}
  .missed-item .ma{color:var(--good); font-weight:600;}

  /* ---------------- FOOTER ---------------- */
  footer.foot{
    text-align:center; padding:26px 20px; background:var(--black);
  }
  footer.foot img{height:36px; margin-bottom:10px; background:#fff; padding:6px 14px; border-radius:6px;}
  footer.foot .foot-text{font-size:10.5px; color:#8a8a8a; letter-spacing:.5px;}

  @media (max-width:480px){
    header.top{padding:14px 18px;}
    .crumb-bar{padding:12px 18px;}
    main{padding:26px 18px 50px;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <img class="badge-img" id="headerBadge" src="" alt="ITC">
      <div>
        <div class="brand-text">POP<span>QUIZ</span></div>
        <div class="brand-sub">ITC · NZSIA Trainee Knowledge Check</div>
      </div>
    </div>
    <div class="nav-actions">
      <button class="nav-btn" id="modulesBtnNav">Modules</button>
      <button class="nav-btn" id="homeBtn">Main Menu</button>
    </div>
  </header>

  <div class="crumb-bar" id="crumbBar" style="display:none;"></div>

  <main id="main"></main>

  <footer class="foot">
    <img id="footerLockup" src="" alt="Instructor Training Centre">
    <div class="foot-text">Instructor Training Centre · Cardrona &amp; Treble Cone</div>
  </footer>
</div>
