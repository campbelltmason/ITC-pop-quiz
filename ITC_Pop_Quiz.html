/* ============================= QUESTION BANK ============================= */
const QUESTIONS = [

/* ---------------- ART OF TEACHING (module: art) ---------------- */
{level:1, module:'art', type:'mc', q:"What is described as the most important thing in skiing, according to the manual's Art of Teaching section?", options:["Fast progression","Feeling safe","Steep terrain","Group size"], answer:1, note:"Students must feel physically and emotionally safe in the mountain environment — this is treated as the most important thing in skiing."},
{level:1, module:'art', type:'mc', q:"Which three elements are described as the core of what's most important in any ski lesson?", options:["Safety, Fun, Achievement","Speed, Style, Confidence","Safety, Speed, Terrain","Fun, Fitness, Friendship"], answer:0, note:"Getting Stoked on Skiing covers Safety, Fun and Achievement as the foundations for lesson success."},
{level:1, module:'art', type:'mc', q:"According to Maslow's Hierarchy of Needs, what should an instructor consider if a student on a cold day suddenly stops engaging, even though they say they're fine?", options:["They are being lazy","A lower-level need (e.g. physiological) may not be met, even if they won't admit it","They dislike the instructor","They need harder terrain"], answer:1, note:"A student might say 'I'm fine' to avoid standing out, even when a physiological need like warmth isn't being met — spotting this is part of using Maslow's hierarchy."},
{level:1, module:'art', type:'tf', q:"True or False: For learning to happen, students only need to know what is being learned, not why it matters.", options:["True","False"], answer:1, note:"Clarity of Outcome requires students to know both what is being learned AND why it's important."},
{level:1, module:'art', type:'mc', q:"Fitts and Posner's model breaks skill acquisition into three phases. What are they, in order?", options:["Beginner, Intermediate, Advanced","Cognitive, Associative, Autonomous","Trial, Error, Success","Command, Guided, Independent"], answer:1, note:"Learning movement is a sequential process through the Cognitive, Associative, then Autonomous phases."},
{level:1, module:'art', type:'mc', q:"In the Cognitive phase of skill acquisition, what type of feedback is most effective?", options:["Detailed and technical","Simple, general and immediate","Delayed until end of lesson","None — let them work it out"], answer:1, note:"Feedback in the cognitive phase should be simple, general and immediate to enhance performance."},
{level:1, module:'art', type:'mc', q:"A student can now perform a skill with minimum conscious thought and can recall it with little prompting. Which phase of skill acquisition are they in?", options:["Cognitive","Associative","Autonomous","Reflective"], answer:2, note:"The Autonomous phase is characterised by minimum conscious thought, an established motor programme, and increased self-confidence."},
{level:1, module:'art', type:'mc', q:"What are the three main areas that make up every successful lesson?", options:["Warm-up, main activity, cool-down","Setup, Learning & Experiences, Summary","Introduction, Technique, Terrain","Safety brief, drills, free ski"], answer:1, note:"Every lesson is comprised of the Setup (connection and goal-setting), Learning and Experiences (the main body), and the Lesson Summary."},
{level:1, module:'art', type:'mc', q:"What does the 'copy, choose, create' theory describe?", options:["How to build a snow park","How instructors develop their progression-building ability with experience","A method for grading students","A way to select terrain"], answer:1, note:"Less experienced instructors 'copy' proven progressions; as experience grows they 'choose' from a toolbox; eventually they 'create' progressions in the moment."},
{level:1, module:'art', type:'mc', q:"What is a 'progression', as defined in the manual?", options:["A single demonstration","A sequence of steps taken to get a student from one point of development to the next","A type of terrain","A certification level"], answer:1, note:"A progression is the series of steps taken to move a student from one point in their development to the next — linear, logical, gradual, step-by-step."},
{level:1, module:'art', type:'mc', q:"What is the correct order of a 'skiing approach' when introducing a new task?", options:["See an example, hear a description, give it a go","Hear a brief description of what to attempt, see an example, give it a go","Give it a go, hear feedback, try again","Hear how to do it, then why, then what"], answer:1, note:"A skiing approach: students hear a brief description of WHAT to attempt (not how), see an example, then give it a go."},
{level:2, module:'art', type:'mc', q:"Which teaching style is instructor-centred, where the instructor controls what, where, how and why — but not necessarily best for building independence?", options:["Command","Guided Discovery","Reciprocal","Problem Solving"], answer:0, note:"Command style is fully instructor-centred, useful when students have very limited baseline knowledge, but can feel less inclusive."},
{level:2, module:'art', type:'mc', q:"In the Reciprocal teaching style, what is the key mechanism for learning?", options:["Students give each other feedback in pairs","The instructor demonstrates repeatedly","Students solve an open-ended problem alone","Students follow a fixed checklist"], answer:0, note:"Reciprocal pairs students up so they can observe, perform, and give each other feedback."},
{level:2, module:'art', type:'mc', q:"Which teaching style presents a scenario with two or more possible solutions, which the instructor may not even know in advance?", options:["Guided Discovery","Problem Solving","Task-Practice","Self-Analysis/Check"], answer:1, note:"Problem Solving differs from Guided Discovery because there are multiple possible solutions, and even the instructor may not know the answer."},
{level:2, module:'art', type:'mc', q:"What is the main purpose of a 'scaling question' in question-based learning?", options:["To test theoretical knowledge","To turn opinions, emotions or perceptions into a measurable, comparable number", "To assign a certification grade","To identify equipment issues"], answer:1, note:"Scaling questions (e.g. 'rate that turn 1-10') convert subjective feelings into a measure that can be compared over time."},
{level:2, module:'art', type:'tf', q:"True or False: In the Autonomous phase of skill acquisition, feedback should still be simple and general, avoiding specifics.", options:["True","False"], answer:1, note:"In the Autonomous phase, feedback can become specific and highlight errors, since the student has the capacity to process detail."},
{level:2, module:'art', type:'mc', q:"Talk-Show-Feel covers the same three communication modes once labelled 'V-A-K'. What outdated idea has since been debunked?", options:["That everyone has one dominant learning style","That demonstration is more useful than verbal explanation","That feeling-based cues are never useful for adults","That talking should always come first"], answer:0, note:"Talk-Show-Feel was previously presented as V-A-K (visual, audio, kinesthetic). The idea that everyone has one dominant learning style has since been debunked, though talking, showing and feeling all remain valuable communication modes."},
{level:3, module:'art', type:'mc', q:"In the Inclusion teaching style, what question is the instructor essentially answering?", options:["How can this task be made harder for everyone?","How can the same content be differentiated so all learners benefit from it?","How can students be tested most efficiently?","How can the instructor avoid giving feedback?"], answer:1, note:"Inclusion offers different levels of challenge within the same activity so that every student is appropriately challenged."},
{level:3, module:'art', type:'mc', q:"The 'Window of Tolerance' concept relates most closely to which topic?", options:["Managing stress and a student's capacity to learn","Ski boot fitting","Snow condition assessment","Certification pathway planning"], answer:0, note:"Window of Tolerance sits within Managing Stress, describing the zone in which a student can process and learn without being in fight-flight-freeze."},
{level:3, module:'art', type:'mc', q:"Which of these is NOT one of the '7 Rs' style qualities recommended for activities that help a student stay within their window of tolerance?", options:["Repetitive","Rhythmical","Reckless","Respectful"], answer:2, note:"The manual lists Repetitive, Rhythmical, Reciprocal, Relational, Relevant, Rewarding and Respectful — not 'Reckless'."},
{level:1, module:'art', type:'mc', q:"Which described role of the instructor emphasises listening, trust, and an element of friendship with students?", options:["Goal Setter","Counsellor & Friend","Safety Officer","Terrain Manager"], answer:1, note:"The Counsellor & Friend role is built on trust, honesty, support and encouragement, with the instructor being approachable."},
{level:1, module:'art', type:'mc', q:"Which described role of the instructor involves negotiating appropriate goals and limits with students to plan their development?", options:["Goal Setter","Entertainer","Terrain Manager","Timekeeper"], answer:0, note:"The Goal Setter role has instructors work with students to negotiate appropriate goals and limits with clear, well-communicated pathways."},
{level:2, module:'art', type:'mc', q:"What is 'Self-Actualisation' considered to be, within Maslow's Hierarchy of Needs?", options:["The first need that must be met","The absolute pinnacle of performance and achievement","A need only relevant to children","A synonym for physiological needs"], answer:1, note:"Self-actualisation is the need or desire to be the best you can be — considered the pinnacle of performance and achievement, which not everyone reaches."},
{level:2, module:'art', type:'mc', q:"What are the two dimensions of behaviour the Self-Analysis/Check teaching style focuses on?", options:["Speed and terrain choice","Individual practice and self-assessment","Group size and lesson length","Safety and equipment fit"], answer:1, note:"Self-Analysis/Check focuses on individual practice combined with the learner self-assessing their own performance against set criteria."},
{level:2, module:'art', type:'mc', q:"What is the 'chaining' or 'chunking' approach to teaching?", options:["Skiing as many runs as possible in one session","Breaking a skill down into small parts and building it up slowly","A style used only for terrain park teaching","A synonym for command style"], answer:1, note:"Chaining or chunking breaks a skill into small parts, built up slowly — well suited to a learner who prefers to take their time."},
{level:2, module:'art', type:'mc', q:"What is 'whole-part-whole' as a teaching approach?", options:["Teaching only isolated drills with no final-form skiing","Mostly final-form skiing with brief stops to look at a specific part, then returning to final form","A style used exclusively with adults","A synonym for guided discovery"], answer:1, note:"Whole-part-whole involves doing mostly final-form skiing with brief stops on a specific part before returning to full skiing — suited to a 'learning by doing' student."},
{level:2, module:'art', type:'mc', q:"What is the purpose of 'reading' your guests as they arrive for a lesson (e.g. noticing if they look nervous or distracted)?", options:["To judge their skiing ability before they've skied","To decide on an appropriate way to open up the conversation with them","It has no real purpose, just small talk","To assign them to a certification level"], answer:1, note:"Reading a guest's body language and demeanour as they arrive helps the instructor decide how best to open the conversation and start building rapport."},
{level:2, module:'art', type:'mc', q:"Before giving feedback to children, what does 'Develop Relationships' require from the instructor?", options:["Establishing trust and rapport first, using emotional intelligence to judge timing and delivery style","Skipping straight to technical correction","Avoiding any personal conversation","Only giving feedback at the end of the day"], answer:0, note:"Establishing trust and rapport is described as paramount before meaningful feedback can be given, using emotional intelligence to judge the right time and style."},
{level:2, module:'art', type:'mc', q:"What is the purpose of using a mix of semi-open and closed questions with children during a lesson?", options:["To catch students out","To get the best out of students and make them reflect on their experiences — reflection creates learning","To fill time between runs","To assess fitness levels only"], answer:1, note:"A variety of questioning strategies helps gauge lesson success and prompts children to reflect on specific experiences, since reflection creates learning."},
{level:2, module:'art', type:'mc', q:"In Talk-Show-Feel, which communication mode is often focused on the least by instructors?", options:["Talk","Show","Feel","They are all used equally by default"], answer:2, note:"The manual notes that 'Feeling' is often the communication mode that gets focused on the least, even though talking and showing come more naturally."},
{level:2, module:'art', type:'mc', q:"Which student is best suited to a 'Talk'-dominant communication approach, based on the manual's description?", options:["One who often attempts movements during the explanation","One who asks a lot of questions and repeats instructions back in their own words","One who watches others very closely before trying anything","One who never asks questions"], answer:1, note:"Students who favour the 'Talk' mode often ask lots of questions or repeat instructions back, and tend to process information mentally before practising."},

/* ---------------- SKI TECHNIQUE / MOVEMENT ANALYSIS (module: tech) ---------------- */
{level:1, module:'tech', type:'mc', q:"What are the four movements of skiing identified by the NZSIA?", options:["Fore/Aft, Vertical, Rotational, Lateral","Speed, Balance, Edge, Control","Push, Pull, Turn, Stop","Uphill, Downhill, Across, Around"], answer:0, note:"The four movements of skiing are Fore/Aft, Vertical, Rotational and Lateral movement, applied through the base of support."},
{level:1, module:'tech', type:'mc', q:"What is the 'athletic stance' as defined in the glossary?", options:["Leaning back on the tails","Centre of gravity directly above and between the base of support","Skis pointed straight downhill only","A stance used only for racing"], answer:1, note:"Athletic stance: centre of gravity directly above the centre of the base of support and between the two skis."},
{level:1, module:'tech', type:'tf', q:"True or False: In a basic straight run, the goal is to keep the skis flat and parallel, with minimal edge angle.", options:["True","False"], answer:0, note:"During a straight run, skis should stay flat and parallel with minimal edging, weighted from the centre."},
{level:1, module:'tech', type:'mc', q:"When first introducing skis and boots on flat terrain, which of the four movements is used to help the skier turn around (e.g. a bullfighter turn)?", options:["Fore/Aft","Vertical","Rotational","None — this is a lateral movement only"], answer:2, note:"Rotational movement is introduced to develop the ability to turn the legs, used for actions like bullfighter turns on the flat."},
{level:1, module:'tech', type:'mc', q:"What are the three phases of a turn, in order?", options:["Start, Middle, Finish","Create, Control, Release","Setup, Steer, Stop","Initiation, Apex, Recovery"], answer:1, note:"A turn is broken into the Create phase (beginning), Control phase (middle) and Release phase (end)."},
{level:1, module:'tech', type:'mc', q:"In a basic wedge turn, where does pressure build under the outside ski during a round turn?", options:["Throughout the top half of the turn","Throughout the bottom half of the turn","Only at the very end of the turn","Pressure stays equal on both skis"], answer:1, note:"Pressure builds underneath the outside ski throughout the bottom half of a round wedge turn."},
{level:1, module:'tech', type:'mc', q:"What is a 'platform' in ski technique terms?", options:["A type of terrain park feature","What's created by setting the edges into the snow to balance and move from","The flat base of the ski itself","A beginner teaching area"], answer:1, note:"A platform is created by setting the edges into the snow, giving the skier something to balance on and move from."},
{level:2, module:'tech', type:'mc', q:"In a wedge-to-parallel turn, what allows the skis to become parallel by the end of the turn?", options:["Establishing grip and balance on the outside ski, then steering the inside ski to match","Keeping both skis in a fixed wedge shape throughout","Removing edge angle entirely","Leaning the upper body away from the turn"], answer:0, note:"The skier establishes outside ski grip/balance, then steers the inside ski at a faster rate to bring it parallel by turn's end."},
{level:2, module:'tech', type:'mc', q:"What is 'angulation' used for?", options:["Increasing speed only","Laterally tipping and flexing body segments to control edge angle and outside ski balance","A method of stopping quickly","Adjusting boot canting"], answer:1, note:"Angulation is the lateral tipping and flexing of body parts relative to each other, helping control edge angle and outside ski balance."},
{level:2, module:'tech', type:'tf', q:"True or False: In bump skiing, the create phase of a turn is typically located on the back side of the bump.", options:["True","False"], answer:0, note:"In bumps, the create phase sits on the back of the bump, control phase in the trough/face, and release phase on top of the bump."},
{level:2, module:'tech', type:'mc', q:"What does 'centre of gravity' (COG) refer to?", options:["The middle point of the ski base","The theoretical point where all the body's mass is considered concentrated","The point where the boot meets the binding","A fixed point that never changes"], answer:1, note:"COG is the theoretical point at which all the body's mass is considered concentrated; it moves as the body's position changes."},
{level:2, module:'tech', type:'mc', q:"During the Release phase of a turn, what generally happens to edge angle?", options:["It increases sharply","It is released to flatten the skis","It stays maximal","It doesn't apply to this phase"], answer:1, note:"In the release phase, edge angle is released to flatten the skis in preparation for the next turn."},
{level:3, module:'tech', type:'mc', q:"What does 'DIRRT' stand for — the five movement descriptors used to describe how a movement is performed?", options:["Duration, Intensity, Rate, Range, Timing","Downhill, Inside, Right, Release, Turn","Direction, Inclination, Rotation, Reaction, Torque","Drive, Impulse, Resistance, Recovery, Tempo"], answer:0, note:"DIRRT stands for Duration, Intensity, Rate, Range and Timing — five descriptors used to describe how a movement or movements are being performed."},
{level:3, module:'tech', type:'mc', q:"What is the relationship between COG and BOS (base of support) central to performance skiing?", options:["They should always be identical","Directing and controlling the path of the COG relative to the BOS is central to managing forces through a turn","BOS is irrelevant once a skier reaches Level Three","COG should always stay outside the BOS"], answer:1, note:"Performance skiing is built around directing/controlling the COG's path relative to the BOS to manage the forces acting on the skier."},
{level:1, module:'tech', type:'mc', q:"What is a 'braking wedge'?", options:["A narrow gliding wedge used only for turning","Skis in a convergent position with enough edge angle to slow or stop the skier, wider than a gliding wedge","A type of parallel turn","A wedge only used by children"], answer:1, note:"A braking wedge is typically wider than a gliding wedge and used with sufficient edge angle to slow or stop the skier."},
{level:2, module:'tech', type:'mc', q:"What is 'skidding' in ski technique?", options:["A combination of sliding and slipping as the skis move through a turn that isn't carving","Another word for edge angle","A method of stopping only used by beginners","The point where two skis meet"], answer:0, note:"Skidding occurs on a ski that is not carving — a combination of sliding and slipping as the ski moves through the turn."},
{level:2, module:'tech', type:'mc', q:"What is an 'edge set'?", options:["The maximum edge angle a ski can physically reach","A purposeful edge engagement, usually at the end of a turn, that provides a platform for the next turn","A type of binding adjustment","A synonym for a gliding wedge"], answer:1, note:"An edge set is a purposeful edge engagement that provides a platform for the next turn, usually occurring at the end of a turn."},
{level:3, module:'tech', type:'mc', q:"What is 'counter rotation', and when is it most effective?", options:["Turning both legs the same direction; effective at high speed only","The upper and lower body twisting in opposing directions; most effective with little or no ski resistance, e.g. on top of a mogul or in the air","A beginner-only technique for stopping","Rotating the pelvis without moving the legs"], answer:1, note:"Counter rotation involves the upper and lower body turning in opposing directions, with a high rate of turn and short duration — most effective when the skis have very little or no resistance."},
{level:3, module:'tech', type:'mc', q:"What distinguishes a 'dynamic parallel turn' from a standard parallel turn?", options:["It involves more carving than skidding","It only happens in powder","It requires a wider stance","It removes the need for edge angle"], answer:0, note:"A dynamic parallel turn is a turn with more carving than skidding, generally associated with upper-level skiing performance."},
{level:3, module:'tech', type:'mc', q:"In skiing physics, what is 'centripetal force' responsible for?", options:["Pulling the skier towards the outside of the turn","Keeping a turning skier moving along a curved path, directed toward the centre of the turn","Slowing the skier down on flat terrain","Increasing a ski's camber"], answer:1, note:"Centripetal force acts toward the centre of rotation and is responsible for keeping a turning skier moving along a curved path."},
{level:3, module:'tech', type:'mc', q:"What is 'centrifugal force', technically speaking, in the context of skiing?", options:["A real force that pulls the skis apart","A pseudo-force — the felt effect of being pulled to the outside of a turn, resulting from forces building in the turn rather than causing them","A force that only exists on hard-pack snow","Another name for gravity"], answer:1, note:"Centrifugal force is described as a pseudo-force — the sensation of being pulled outward, which results from forces building in the turn rather than causing them."},
{level:3, module:'tech', type:'mc', q:"Using the pressure equation P=F/A, what happens to pressure under a skier's remaining ski if they lift the other ski off the snow?", options:["Pressure decreases, since force is now spread differently","Pressure increases, because the contact area decreases while the force (the skier's weight) stays the same","Pressure stays exactly the same","Pressure becomes impossible to calculate"], answer:1, note:"With P=F/A, reducing the contact area (A) while force (F) stays constant increases pressure (P) — this is why pressure builds under the remaining ski."},
{level:3, module:'tech', type:'mc', q:"What determines whether a ski holds and carves, or slips and skids, according to the manual's ski interaction angles?", options:["Edge angle alone, regardless of anything else","Platform angle — whether the force applied is at 90 degrees or less relative to the snow's reaction force (holds) or greater than 90 degrees (skids)","The length of the ski only","Air temperature"], answer:1, note:"Platform angle determines grip versus skid: if the applied force is 90 degrees or less relative to the snow's reaction force the ski holds and carves; if greater than 90 degrees, it slips and skids."},
{level:3, module:'tech', type:'mc', q:"What is the difference between 'edge angle' and 'platform angle'?", options:["They are exactly the same thing","Edge angle is the ski's tilt relative to the snow surface and affects turn shape; platform angle is relative to the snow's reaction force and determines whether the ski grips or skids","Edge angle only matters in powder; platform angle only matters on hard pack","Platform angle is a synonym for steering angle"], answer:1, note:"Edge angle affects how much a ski bends and its resulting turn shape; platform angle (relative to the snow's reaction force) determines whether the ski grips/carves or slips/skids."},
{level:3, module:'tech', type:'mc', q:"What is 'steering angle'?", options:["The angle between the direction of travel and the direction the ski is pointed — also related to the ski's side cut","The angle of a chairlift tower","A synonym for camber","The angle at which a boot is canted"], answer:0, note:"Steering angle is the angle between the skier's direction of travel and the direction the ski is pointed, which is also referred to as the ski's side cut."},
{level:3, module:'tech', type:'mc', q:"How does the manual define 'biomechanics'?", options:["The study of ski equipment materials","The science of human bodies in motion, combining mechanics (forces on objects) and anatomy","A synonym for skill acquisition","The study of snow crystal formation"], answer:1, note:"Biomechanics is the science of human bodies in motion, combining the fields of mechanics (physics of forces on objects) and anatomy."},
{level:3, module:'tech', type:'mc', q:"What is the difference between 'internal' and 'external' forces in skiing?", options:["There is no meaningful difference","Internal forces are generated by the skier's own muscular-skeletal movements; external forces include gravity, friction and reaction forces from the snow","Internal forces only apply to children","External forces only occur above a certain speed"], answer:1, note:"Internal forces come from the skier's muscular-skeletal movements (the Four Movements); external forces include gravity, friction and the snow's reaction force."},
{level:3, module:'tech', type:'mc', q:"According to Newton's third law as applied to skiing, what happens when a ski pushes into the snow during a turn?", options:["The snow has no effect on the skier","The snow pushes back on the ski with an equal and opposite force, which the skier resists with muscular tension","The skier's mass instantly decreases","Only the outside ski is affected by any reaction force"], answer:1, note:"Newton's third law — every action has an equal and opposite reaction — means the snow pushes back on the ski with equal force in the opposite direction, which the skier balances against using muscular tension."},

/* ---------------- TEACHING TOOLS & TIPS / CORRECTIVE (module: tools) ---------------- */
{level:1, module:'tools', type:'mc', q:"In the What-Why-How framework, what comes first when introducing a task?", options:["How to do it technically","What the task is (not yet how)","Why it matters emotionally","A full biomechanical breakdown"], answer:1, note:"A skiing approach starts with WHAT to attempt (not how), reinforcing that 'what' precedes technical detail."},
{level:1, module:'tools', type:'mc', q:"Which of the three Talk-Show-Feel modes involves developing tangible physical sensations for the student?", options:["Talk","Show","Feel","None of the above"], answer:2, note:"'Feel' involves indicating specific body parts and developing tangible, felt sensations for the student."},
{level:1, module:'tools', type:'tf', q:"True or False: When demonstrating (the 'Show' in Talk-Show-Feel), instructors should only demonstrate facing away from students.", options:["True","False"], answer:1, note:"Instructors should demonstrate both towards and away from students so they can see the movement from multiple angles."},
{level:1, module:'tools', type:'mc', q:"What is the purpose of corrective teaching content in the manual?", options:["To identify common inefficiencies and offer simple corrective steps","To replace the need for demonstrations","To assign fault to the student","To design terrain parks"], answer:0, note:"Corrective Teaching icons flag common inefficiencies in student performance along with simple, practical corrective steps."},
{level:1, module:'tools', type:'mc', q:"A student is struggling to balance on the outside ski during a basic wedge turn. Which corrective idea fits the manual's suggestions?", options:["Skip outside ski balance and move to parallel turns","Use a static exercise to help the student feel the outside ski becoming heavier","Increase speed immediately","Remove poles"], answer:1, note:"A listed corrective step is a static exercise to feel the outside (downhill) ski becoming heavier."},
{level:2, module:'tools', type:'mc', q:"What is the core idea behind Seek-Give-Seek as a feedback structure?", options:["The instructor gives feedback twice in a row","The instructor first seeks the student's own perception, then gives feedback, then seeks the student's response/understanding", "The student is never asked for input","Feedback is only given at the end of a full-day lesson"], answer:1, note:"Seek-Give-Seek starts by seeking the student's self-assessment, follows with instructor feedback, then seeks the student's reaction/understanding to close the loop."},
{level:2, module:'tools', type:'mc', q:"Which self-reflection question is most in line with the manual's approach after using guided discovery?", options:["\"Was guided discovery successful?\"","\"Did I ski fast enough?\"","\"Did I use enough terrain?\"","\"How many runs did we do?\""], answer:0, note:"Self-reflection prompts like 'Was guided discovery successful?' and 'Did I show the students?' are used to evaluate teaching effectiveness."},
{level:3, module:'tools', type:'mc', q:"When building a progression for a more experienced instructor operating in the 'create' stage of copy-choose-create, what best describes their approach?", options:["They rigidly follow a memorised progression regardless of the student","They adapt progressions in real time based on ongoing analysis of the student's performance","They avoid decision-making entirely","They only use command style"], answer:1, note:"In the 'create' stage, instructors build progressions as the student learns, adapting activities based on real-time analysis."},
{level:1, module:'tools', type:'mc', q:"What is 'extrinsic feedback'?", options:["Feedback the student generates entirely on their own","Feedback provided by an external source, e.g. an observer or the instructor","Feedback given only in writing","A synonym for corrective teaching"], answer:1, note:"Extrinsic feedback is feedback provided by an external source, such as an observer."},
{level:1, module:'tools', type:'mc', q:"What is a 'demonstration', as defined in the glossary?", options:["A written test of technical knowledge","Performing a task or exercise as an example for students","A type of terrain feature","A certification exam"], answer:1, note:"Demonstration is performing a task or exercise as an example for students."},
{level:1, module:'tools', type:'mc', q:"What is a 'closed question', and what kind of response does it typically get?", options:["A question that elicits a limited response, e.g. 'Are your boots done up firmly?'","A question with no possible answer","A question only used with children","A question that always requires a numeric answer"], answer:0, note:"A closed question elicits a limited response — the glossary example given is 'Are your boots done up firmly?'"},
{level:2, module:'tools', type:'mc', q:"A student struggles to balance on the outside ski in a wedge turn. Which playful corrective activity does the manual suggest?", options:["Skipping straight to parallel turns","Games like 'pat the dog' or 'bounce the basketball'","Removing their poles for the rest of the lesson","Increasing speed immediately"], answer:1, note:"Corrective teaching suggestions for outside ski balance include games and activities like 'pat the dog' or 'bounce the basketball'."},
{level:2, module:'tools', type:'mc', q:"After a lesson using guided discovery, which self-reflection question checks whether demonstrations were shown from multiple angles?", options:["\"Did I show towards students as well as away from them?\"","\"Did I ski fast enough?\"","\"How many turns did we make?\"","\"Was the terrain steep enough?\""], answer:0, note:"This self-reflection prompt checks whether the instructor demonstrated both towards and away from students, covering the 'Show' element of Talk-Show-Feel."},
{level:3, module:'tools', type:'mc', q:"For developing the rate of leg rotation needed in short turns, which simple teaching tactic does the manual suggest?", options:["A 'follow me' activity, gradually making turns shorter","Only static, off-snow exercises","Avoiding demonstrations at this level","Verbal explanation only, no practice"], answer:0, note:"A listed teaching tactic for short turns is a 'follow me' activity where the instructor makes their turns progressively shorter for the student to match."},
{level:3, module:'tools', type:'mc', q:"When teaching advanced parallel turns, what teaching tactic helps a student develop earlier edging?", options:["Encouraging inclination of the legs at the very beginning of the turn","Removing edge angle entirely","Slowing down until edging happens automatically","Avoiding blue terrain"], answer:0, note:"For advanced parallel turns, the tactic is to develop student understanding of inclination early in the turn to build earlier, more dynamic edging."},
{level:1, module:'tools', type:'mc', q:"A student's wedge is asymmetrical and their ski tips keep crossing. What's the likely cause and fix?", options:["They're rotating their legs without laterally opening them enough — encourage moving laterally from the femurs, not just the knees","They need steeper terrain immediately","Their boots are too loose","Nothing can be done, some skiers just have this issue"], answer:0, note:"If students rotate their legs without laterally opening them, the tips will cross — the fix is to check they're moving laterally from the femurs, not just the knees."},
{level:1, module:'tools', type:'mc', q:"A student is struggling to control speed in a gliding wedge. What corrective check does the manual suggest?", options:["Check that the skis are on edge from lateral leg movement, and that steering is coming from the legs, not the feet","Tell them to lean back further","Remove their poles","Have them ski faster to build confidence"], answer:0, note:"Speed control issues often come from insufficient edge (lateral movement) or steering originating from the feet rather than the legs, which flattens the ski."},
{level:1, module:'tools', type:'mc', q:"A student loses balance or becomes stiff as they create a wedge. What should the instructor check?", options:["That the legs aren't being excessively extended and that joints, especially the ankles, are flexing evenly","That they're skiing fast enough","That their poles are the correct length","That the terrain is steep enough"], answer:0, note:"This fault is often linked to over-extension of the legs or uneven joint flexion — particularly whether the ankle is opening (extending) properly as the wedge forms."},
{level:1, module:'tools', type:'mc', q:"A student can only turn their wedge one way. What's a sensible first check?", options:["Make sure a good, stable gliding wedge is happening before turning, and that turning is coming from the legs","Switch them to parallel skis immediately","Assume it's an equipment fault","Have them try steeper terrain"], answer:0, note:"This fault is usually addressed by confirming a stable gliding wedge is established first, and that the turning effort is coming from the legs."},
{level:1, module:'tools', type:'mc', q:"A student struggles to coordinate leg steering and keeps using their hands and shoulders to turn instead. What's the recommended approach?", options:["Be patient, give lots of encouragement, and keep reinforcing leg steering","Tell them to stop using their hands immediately and ski without poles","Move straight to parallel turns to bypass the issue","This can't be corrected and is a natural style difference"], answer:0, note:"It often takes time for students to identify the muscles used for leg steering — patience and consistent reinforcement of leg steering is the recommended approach."},
{level:1, module:'tools', type:'mc', q:"In rounded wedge turns, a student's wedge keeps increasing in size until they stop. What's the likely cause?", options:["They are rushing to steer too quickly, using their body and outside leg rather than both legs gradually","Their skis are too long","They are steering too slowly","The terrain is too flat"], answer:0, note:"This is usually caused by rushing the steering effort — encouraging both legs to steer more gradually helps resolve it."},
{level:1, module:'tools', type:'mc', q:"In a wedge-to-parallel turn, a student struggles to rotate their inside ski earlier to become parallel. What's a useful corrective cue?", options:["Encourage them to balance early on the outside ski and allow their COG to move back above their feet, with lots of practice time","Tell them to stop trying and stick with a wedge","Reduce their speed to zero","Have them remove one ski entirely"], answer:0, note:"Encouraging early outside ski balance and allowing the COG to return above the feet, combined with practice time, helps the inside ski rotate to parallel sooner."},
{level:1, module:'tools', type:'mc', q:"A student finds it counter-intuitive to angulate correctly during an advanced wedge turn. What's the suggested corrective approach?", options:["Show them clearly, explain the movement needs to come from the hip joint, and keep leg steering strong","Tell them angulation isn't important at this stage","Have them ski without demonstrating first","Skip angulation until Level Two"], answer:0, note:"Angulation can feel counter-intuitive for beginners — showing the movement, explaining it comes from the hip joint, and maintaining strong leg steering are recommended."},
{level:2, module:'tools', type:'mc', q:"In the 'Show' communication mode, what's the difference between a stationary and a moving demonstration?", options:["There is no difference — they achieve the same thing","Stationary demonstrations are effective for focusing on a specific part or movement; moving demonstrations work well skiing towards and away from the class","Moving demonstrations are only for advanced students","Stationary demonstrations should never be used"], answer:1, note:"Stationary demonstrations suit focusing on a particular part of a turn or movement, while moving demonstrations are effective while skiing towards and away from the class."},
{level:2, module:'tools', type:'mc', q:"What technique can help when communicating using the 'Feel' mode?", options:["Using analogies to other sports or day-to-day movements, and manipulating body parts into position while stationary","Avoiding all physical contact or reference points","Only using written handouts","Speaking louder than usual"], answer:0, note:"Analogies to similar movements from other sports or everyday life, plus manipulating body parts into the desired position while stationary, can support the 'Feel' communication mode."},
{level:2, module:'tools', type:'mc', q:"When giving feedback to children, what does 'Manage Expectations' involve?", options:["Making sure children understand that learning a new skill involves some frustration, and that everyone develops at different rates","Telling children exactly how good they are compared to others","Avoiding any mention of difficulty","Setting a fixed timeline for skill mastery"], answer:0, note:"Managing expectations means helping children understand that a bit of frustration is normal when learning, and that patience is needed as everyone progresses at their own rate."},
{level:2, module:'tools', type:'mc', q:"Why is it important to honour a commitment like asking children which run to ski next and then actually doing it?", options:["It doesn't matter, children forget quickly","Two-way communication involves listening and builds trust; not following through loses that trust","It's only relevant for adult lessons","Children don't notice inconsistency"], answer:1, note:"Two-way communication builds trust — if you ask for input and then don't follow through, that trust is lost."},

/* ---- Level 1 Common Faults & Effects (source: NZSIA Level 1 Common Faults and Effects) ---- */
{level:1, module:'tools', type:'mc', q:"In a straight run, a student's balance is aft. What is the effect?", options:["Reduced access to the movements needed to ski, with pressure directed to the tails of the skis","Improved edge grip","No noticeable effect on performance","Faster acceleration only"], answer:0, note:"Balance aft in a straight run reduces access to the movements required to ski and directs pressure to the tails of the skis."},
{level:1, module:'tools', type:'mc', q:"A student stands too tall with all joints open in a straight run. What is the effect?", options:["Reduced access to the movements needed to ski, with the COG unbalanced","Perfectly balanced, ideal athletic stance","Excessive edge grip","Pressure directed only to the tips"], answer:0, note:"Standing too tall with joints fully open reduces access to the movements required to ski and leaves the COG unbalanced."},
{level:1, module:'tools', type:'mc', q:"A student stands bent over, over-flexed at the hips, in a straight run. What is the effect?", options:["Pressure is directed to the tails of the skis","Reduced access to the movements needed to ski, with pressure directed to the tips of the skis","No effect on ski performance","Improved rotational movement"], answer:1, note:"Being over-flexed at the hips reduces access to the movements needed to ski and directs pressure to the tips of the skis."},
{level:1, module:'tools', type:'mc', q:"A student balances more on one foot than the other during a straight run. What is the effect?", options:["Lateral/outside ski balance and pressure are incorrectly distributed on the skis","Improved speed control","No real consequence at beginner level","Better edge angle on both skis"], answer:0, note:"Balancing more on one foot leads to reduced access to required movements and incorrectly distributed lateral/outside ski balance and pressure."},
{level:1, module:'tools', type:'mc', q:"In a gliding wedge, a student has too much edge angle. What is the effect?", options:["Skis slide too easily, reducing speed control","Skis grip excessively, reducing the ability to glide in a straight line","No noticeable effect","Skis track perfectly straight"], answer:1, note:"Too much edge angle in a gliding wedge causes the skis to grip excessively, reducing the ability to glide in a straight line."},
{level:1, module:'tools', type:'mc', q:"In a gliding wedge, a student doesn't have enough steering angle. What is the effect?", options:["Skis track too straight, making it difficult to control speed", "Skis over-steer and skid excessively","Skis grip too much","The wedge becomes uneven"], answer:0, note:"Not enough steering angle causes the skis to track too straight, making speed control difficult in the glide."},
{level:1, module:'tools', type:'mc', q:"In a gliding wedge, a student has too much steering angle. What is the effect?", options:["The skis over-steer or skid, leading to excessive braking and reduced control, with the skis possibly crossing tips","The skis glide too freely with no speed control","The wedge becomes perfectly symmetrical","There is no meaningful effect"], answer:0, note:"Too much steering angle causes over-steering or skidding, excessive braking, reduced control, and the skis may cross tips."},
{level:1, module:'tools', type:'mc', q:"When making basic turns, a student pushes one foot away to create the wedge. What is the effect?", options:["An uneven wedge that disrupts balance and steering, often causing a sudden direction change with balance falling to the inside ski","A perfectly even, symmetrical wedge","Improved outside ski balance","Faster, more controlled turns"], answer:0, note:"Pushing one foot away creates an uneven wedge, disrupts balance and steering, and often causes a sudden direction change with balance falling to the inside ski."},
{level:1, module:'tools', type:'mc', q:"When making basic turns, a student rotates their upper body to initiate the turn. What is the effect?", options:["Turning of the skis becomes delayed and balance becomes erratic, compromising edging and steering accuracy","The turn becomes faster and more precise","No effect on turning ability","Improved rotational separation"], answer:0, note:"Rotating the upper body delays the turning of the skis and makes balance erratic, compromising edging and steering accuracy."},
{level:1, module:'tools', type:'mc', q:"In a round wedge turn, a student steers too fast. What is the effect?", options:["A sudden direction change that reduces turn shape and consistency, making speed control more difficult","A perfectly round, controlled turn","Improved outside ski balance","No noticeable effect"], answer:0, note:"Steering too fast in a round wedge turn causes a sudden direction change, reducing turn shape consistency and making speed control harder."},
{level:1, module:'tools', type:'mc', q:"A student's wedge turns are too open (turning too little between turns). What is the effect?", options:["Skis travel too far downhill between turns, reducing the ability to control speed and increasing momentum","The skier stops too abruptly","Speed control improves significantly","No effect on momentum"], answer:0, note:"Turns that are too open let the skis travel too far downhill between turns, reducing speed control and increasing momentum."},
{level:1, module:'tools', type:'mc', q:"While turning, a student's upper body/shoulders tip inside the turn. What is the effect?", options:["The COG shifts inside the turn too fast, compromising outside ski pressure and the ability to steer/edge effectively","Outside ski pressure increases ideally","The turn becomes rounder and more controlled","No effect on balance"], answer:0, note:"Shoulders tipping inside the turn moves the COG inside too quickly, compromising outside ski pressure and steering/edging ability."},
{level:1, module:'tools', type:'mc', q:"While turning, a student's COG moves too far to the inside of the turn. What is the effect?", options:["The outside ski loses pressure and the inside ski flattens, making it difficult to grip, turn, maintain the wedge, or manage speed","The outside ski gains more pressure and control","The wedge becomes more stable","No noticeable effect"], answer:0, note:"COG moving too far inside causes the outside ski to lose pressure and the inside ski to flatten, making it hard to grip, turn, maintain the wedge, or manage speed."},
{level:1, module:'tools', type:'mc', q:"A student's extension happens at too fast a rate during a turn. What is the effect?", options:["A sudden release of pressure from the skis, which can lead to loss of control and balance early in the new turn","Smooth, controlled turn transitions","Increased grip through the whole turn","No effect on balance"], answer:0, note:"Extension happening too fast causes a sudden pressure release from the skis, which can lead to loss of control and balance early in the new turn."},
{level:1, module:'tools', type:'mc', q:"A student's flexion is directed too far aft during a turn. What is the effect?", options:["Balance moves to the tails of the skis, reducing turning ability and control through the middle and end of the turn","Balance moves ideally to the centre of the skis","Improved grip through the whole turn","No noticeable change in balance"], answer:0, note:"Flexion directed too far aft shifts balance to the tails of the skis, reducing turning ability and control through the middle and end of the turn."},

/* ---- Level 2 Common Faults (source: L2 Trainers Outline 2026, SP1-SP4 fault bank) ---- */
{level:2, module:'tools', type:'mc', q:"At SP1 (Introduce Wedge to Parallel), a student maintains a wide wedge all the way through each turn. What does this prevent?", options:["A speed increase and the ability to balance earlier in the turn to allow the skis to match to parallel","Any turning at all","Correct pole timing","Excess speed"], answer:0, note:"SP1 Fault A: maintaining a wide wedge throughout the turn prevents a speed increase and earlier balance needed to bring the skis to parallel."},
{level:2, module:'tools', type:'mc', q:"At SP1, a student matches the inside ski to parallel by lifting and stepping it in rather than steering it. What's the correct fix?", options:["Steer the inside ski progressively using external leg rotation, instead of lifting or stepping it in","Encourage more lifting for stability","Ignore it — lifting is an acceptable technique at this level","Widen the wedge further"], answer:0, note:"SP1 Fault B involves lifting/stepping the inside ski instead of steering it in progressively via external leg rotation — the fix targets that steering mechanism."},
{level:2, module:'tools', type:'mc', q:"At SP1, a student pulls or drags the inside ski to match to parallel, with the pivot point at the tip of the ski. What does this typically result in?", options:["A very narrow stance","A wider, more stable stance","Improved edge angle on the outside ski","Better speed control"], answer:0, note:"SP1 Fault C — dragging or pulling the inside ski with the pivot at the tip — results in a very narrow stance due to poor rotational mechanics."},
{level:2, module:'tools', type:'mc', q:"At SP2 (Develop Wedge to Parallel), a student maintains a wide wedge at the start of each turn. What does this delay?", options:["Steering of the inside ski to parallel above the fall line","The release phase only","Pole touch timing","Nothing significant"], answer:0, note:"SP2 Fault A: a wide wedge at the start restricts speed increase and earlier outside ski balance, delaying steering of the inside ski to parallel above the fall line."},
{level:2, module:'tools', type:'mc', q:"At SP2, a student's pelvis counter-rotates and drops into the turn in an attempt to increase edge angle. What's the result?", options:["An inability to tip and turn the legs effectively","A perfectly controlled increase in edge angle","Improved outside ski balance","No effect on steering"], answer:0, note:"SP2 Fault B: twisting and dropping the pelvis into the turn to try to edge results in an inability to tip and turn the legs effectively."},
{level:2, module:'tools', type:'mc', q:"At SP2, a student's outside ski runs on a higher edge angle than the inside ski after matching to parallel. What does this create?", options:["An A-frame at the knees","A wider, more stable stance","Perfectly matched edge angles","Better speed control"], answer:0, note:"SP2 Fault C: an outside ski on a higher edge angle than the inside ski, which stays flatter, creates an A-frame at the knees."},
{level:2, module:'tools', type:'mc', q:"At SP3 (Introduce Parallel Turns), a student remains on the old outside ski too long during the create phase. What happens at the start of the new turn?", options:["A small wedge entry appears at the start of the new turn","The skis become instantly parallel","Outside ski balance improves immediately","Nothing noticeable happens"], answer:0, note:"SP3 Fault A: staying on the old outside ski too long delays weight transfer, causing the skis to briefly open into a small wedge at the start of the new turn."},
{level:2, module:'tools', type:'mc', q:"At SP3, a student moves their COG up the hill to shift balance onto the new outside ski. What's the resulting effect?", options:["An inefficient weight shift and loss of platform, forcing a rapid twist of the skis through the create phase","A smooth, efficient weight transfer","Improved edge grip through the whole turn","No effect on the turn"], answer:0, note:"SP3 Fault B: moving the COG up the hill produces an inefficient weight shift and loss of platform, forcing a rapid twist of the skis through the create phase."},
{level:2, module:'tools', type:'mc', q:"At SP3, a student's outside ski flattens but the inside ski stays on its old edge as the new turn starts. What is this called, and what does it require?", options:["A sequential edge change, which requires the inside ski to be picked up to turn it ('step to parallel')","A simultaneous edge change with no consequence","An advanced carving technique","A correct execution of the movement"], answer:0, note:"SP3 Fault C is a sequential edge change — the inside ski stays on its old edge and needs to be picked up/stepped to bring it to parallel."},
{level:2, module:'tools', type:'mc', q:"At SP4 (Develop Parallel Turns), a student's stance is too tall in the create phase. What does this inhibit?", options:["Active lateral and rotational movements in the legs, preventing the skis from gripping earlier and more effectively","Only the pole touch timing","The release phase exclusively","Nothing of consequence"], answer:0, note:"SP4 Fault A: too tall a stance in the create phase inhibits lateral and rotational leg movements, preventing early, strong grip."},
{level:2, module:'tools', type:'mc', q:"At SP4, a student's skis flatten in the create phase and then twist rapidly to point the new direction. What is the result?", options:["Skidding through the create phase due to a lack of earlier edge grip","A smooth, progressively steered turn","Improved edge angle throughout","No noticeable issue"], answer:0, note:"SP4 Fault B: abruptly twisting the skis rather than rolling and steering them progressively results in skidding through the create phase from a lack of earlier grip."},
{level:2, module:'tools', type:'mc', q:"At SP4, the outside ski rolls onto its new edge but the inside ski stays flatter at the start of the turn. What does this produce?", options:["A visible A-frame at the knees at the start of the turn","A perfectly matched edge angle","Improved balance on the inside ski","No visible effect"], answer:0, note:"SP4 Fault C: a sequential edge change where the inside ski stays flatter than the outside ski produces a visible A-frame at the knees."},

{level:3, module:'tools', type:'mc', q:"What does the 'CAP model' help an instructor understand when giving feedback to children?", options:["The specifics of each age group's physical abilities, to keep expectations realistic","How to fit ski boots correctly","Certification pathway requirements","How to manage large groups"], answer:0, note:"The CAP model educates instructors on the specifics of each age group's physical abilities, helping them set realistic expectations for skill development."},
{level:3, module:'tools', type:'mc', q:"Why is understanding the 'REAL vs IDEAL' relationship important when giving feedback to children?", options:["It's not important, feedback should always describe the ideal only","It's key to delivering meaningful, effective feedback grounded in what's realistic for that child's stage of development","It only applies to adult lessons","It replaces the need for the CAP model"], answer:1, note:"Understanding real (current) versus ideal (theoretical) movement is described as key to delivering meaningful and effective feedback to children."},

/* ---------------- TERMINOLOGY (module: glossary) ---------------- */
{level:1, module:'glossary', type:'mc', q:"What does 'base of support' (BOS) refer to?", options:["The portion of the ski(s) under the foot/feet","The total weight of the skier","A type of ski boot","The uphill edge only"], answer:0, note:"Base of support is the portion of the ski or skis under the foot or feet."},
{level:1, module:'glossary', type:'mc', q:"What is a 'gliding wedge' used for?", options:["Stopping abruptly","A beginner turn/speed-control shape with a narrower stance than a braking wedge","Only for racing gates","A type of ski boot canting"], answer:1, note:"A gliding wedge is typically narrower than a braking wedge and used for turning and controlled speed rather than stopping."},
{level:1, module:'glossary', type:'mc', q:"What does 'perpendicular' mean, as used in ski technique?", options:["Parallel lines that never meet","Two lines or surfaces meeting at a right angle (90 degrees)","A curved edge shape","A type of turn phase"], answer:1, note:"Perpendicular describes two lines/surfaces meeting at a right angle (90 degrees)."},
{level:2, module:'glossary', type:'mc', q:"What is 'proprioception'?", options:["The sense of position and movement of the body and its parts in space","The study of snow crystals","A type of ski flex pattern","A teaching style"], answer:0, note:"Proprioception is the sense of position and movement of the body and body parts in space."},
{level:2, module:'glossary', type:'mc', q:"What does 'retraction' refer to in ski technique?", options:["Extending the legs to increase pressure","Pulling the legs up under the body to absorb pressure changes","Releasing the boots from the bindings","Braking with a wedge"], answer:1, note:"Retraction is pulling the legs up under the body (via hip/abdomen contraction) to absorb pressure increases from terrain or turn dynamics."},
{level:3, module:'glossary', type:'mc', q:"What is 'canting' in relation to equipment?", options:["A type of turn shape","Making lateral adjustments to skis/boots/bindings for optimal alignment and effective edging","A waxing technique","A method of ski storage"], answer:1, note:"Canting is the process of making lateral adjustments to boots/bindings/skis for optimal alignment and edging effectiveness."},
{level:1, module:'glossary', type:'mc', q:"What are 'converging skis'?", options:["Any ski position where the tails are closer than the tips","Any ski position where the tips are closer than the tails, e.g. a wedge","Skis that are perfectly parallel","A type of ski base material"], answer:1, note:"Converging skis describes any position where the tips are closer than the tails — a wedge is the classic example."},
{level:1, module:'glossary', type:'mc', q:"What are 'diverging skis'?", options:["Any position where the tails are closer together than the tips, e.g. skating or a herringbone","Skis pointed in exactly the same direction","A type of binding","Skis with mismatched lengths"], answer:0, note:"Diverging skis describes a position where the tails are closer together than the tips — seen when skating or walking in a herringbone."},
{level:1, module:'glossary', type:'mc', q:"What is the 'fall line'?", options:["The edge of the ski run boundary","The path a ball would take rolling down the slope — the line of least resistance","A type of turn phase","The line where snow meets rock"], answer:1, note:"The fall line is the path a ball would take if you let it roll down the slope, i.e. the line of least resistance."},
{level:1, module:'glossary', type:'mc', q:"What is 'flexion'?", options:["Any movement that increases (opens) the angle at a joint","Any movement that decreases (closes) the angle at a joint","A synonym for edge angle","A type of ski wax"], answer:1, note:"Flexion is any movement that decreases (closes) the angle at a joint — the opposite of extension."},
{level:1, module:'glossary', type:'mc', q:"What is 'extension'?", options:["Any movement that decreases the angle at a joint","Any movement that increases (opens) the angle at a joint","A method of stopping","A type of wedge"], answer:1, note:"Extension is any movement that increases (opens) the angle at a joint — the opposite of flexion."},
{level:1, module:'glossary', type:'mc', q:"What is 'edge angle'?", options:["The angle of the chairlift tower","The amount of ski tilt relative to the surface of the snow and slope","A fixed measurement that never changes","The angle between the two ski tips"], answer:1, note:"Edge angle is the amount of ski tilt relative to the surface of the snow and to the slope. A ski flat on the snow has zero degrees of edge angle."},
{level:2, module:'glossary', type:'mc', q:"What is 'rotational separation'?", options:["Rotation of one part of the body against the body part above it, e.g. legs turning under a stable upper body","Two skiers turning in opposite directions","A type of terrain feature","A method of stopping quickly"], answer:0, note:"Rotational separation is rotation of one body part against the part above it — typically built incrementally from the ground up in skiing."},
{level:2, module:'glossary', type:'mc', q:"What are 'corresponding edges'?", options:["The inner edge of one ski and the outer edge of the other","Both edges of the same ski","The edges used only in a wedge","A term for dull edges needing sharpening"], answer:0, note:"Corresponding edges refers to the inner edge of one ski and the outer edge of the other."},
{level:2, module:'glossary', type:'mc', q:"What is 'dynamic balance'?", options:["Balance while standing still","Balance in motion","A balance exercise for children only","A synonym for angulation"], answer:1, note:"Dynamic balance is defined simply as balance in motion, as opposed to static balance."},
{level:2, module:'glossary', type:'mc', q:"What is 'sequential leg rotation'?", options:["Rotating both legs at the same time","A non-simultaneous rotation of the legs, e.g. in stem turns or step turns","A rotation only used in racing","Rotating the upper body instead of the legs"], answer:1, note:"Sequential leg rotation is a non-simultaneous rotation of the legs, seen in movements like stem turns and step turns."},
{level:3, module:'glossary', type:'mc', q:"What is the difference between 'cross over' and 'cross under'?", options:["They mean the same thing","Cross over moves the COG forward and across the skis from one turn's inside to the next; cross under moves the feet/skis under the COG from one turn's outside to the next","Cross over only applies to racing gates","Cross under is only used in powder"], answer:1, note:"Cross over: the COG moves from inside one turn to inside the next. Cross under: the feet/skis move from outside one turn to outside the next, leaving the COG inside each turn."},
{level:3, module:'glossary', type:'mc', q:"What is the difference between a concentric and an eccentric muscle contraction?", options:["There is no difference","Concentric shortens the muscle while generating force; eccentric lengthens the muscle while developing tension","Concentric only occurs in the legs; eccentric only in the core","Eccentric contractions don't produce force"], answer:1, note:"A concentric contraction shortens the muscle fibres while generating force; an eccentric contraction involves the muscle lengthening while still developing tension."},
{level:1, module:'glossary', type:'mc', q:"What does 'braking' refer to in skiing?", options:["Pushing against or resisting the forces and creating friction to slow down","A type of turn phase","A synonym for a gliding wedge","A method only used by children"], answer:0, note:"Braking generally refers to pushing against or resisting the forces of skiing and creating friction to slow or stop."},
{level:1, module:'glossary', type:'mc', q:"What does 'boot out' mean?", options:["Taking your boots off at the end of the day","Knocking the ski off its edge as a result of the boot contacting the snow during a turn","A type of boot fitting session","Removing boots from bindings for storage"], answer:1, note:"Boot out is when the boot contacts the snow during a turn and knocks the ski off its edge."},
{level:1, module:'glossary', type:'mc', q:"What is 'camber'?", options:["The arch formed when a ski sits on a flat surface, with the middle higher than the tip and tail","The angle of a ski's edge","A type of turn shape","A snow condition"], answer:0, note:"Camber is the arch that forms when a ski is on a flat surface — the middle of the ski sits higher than the tip and tail."},
{level:1, module:'glossary', type:'mc', q:"What are 'carved turns'?", options:["Turns performed only by beginners","Turns in which the skis travel on an edge with minimal lateral slipping or skidding","Turns that always involve a wedge","A turn shape only used in bumps"], answer:1, note:"Carved turns are turns in which the skis travel on an edge with minimal lateral slipping or skidding."},
{level:1, module:'glossary', type:'mc', q:"Where is the 'apex' of a turn?", options:["At the very start of the turn","In the fall line, or the control phase of the turn","At the release phase only","Wherever the skier chooses to stop"], answer:1, note:"The apex of a turn is in the fall line, which corresponds to the control phase of the turn."},
{level:1, module:'glossary', type:'mc', q:"Which joints in the body are examples of 'ball and socket' joints?", options:["The knees only","The hip and shoulders","The ankles only","The spine"], answer:1, note:"Ball and socket joints are joints in the body that rotate and flex — the hip and shoulders are given as examples."},

/* ---------------- CHILDREN / PSYCHOLOGY (module: psych) ---------------- */
{level:2, module:'psych', type:'mc', q:"According to Piaget, which cognitive stage covers roughly birth to two years, where children learn primarily through their senses?", options:["Pre-operational stage","Sensory-motor stage","Concrete-operational stage","Formal-operational stage"], answer:1, note:"The Sensory-motor stage (birth-two years) is when children learn about the world mainly through their senses."},
{level:2, module:'psych', type:'mc', q:"Which stage of play involves children playing alongside each other but engaged in their own separate activity?", options:["Non-social/solitary play","Parallel play","Associative and cooperative play","Reciprocal play"], answer:1, note:"Parallel play is when children play side-by-side but remain engaged in their own individual activity."},
{level:3, module:'psych', type:'mc', q:"'Theory of mind' in child development refers to what?", options:["The ability to solve technical problems","Understanding that others have thoughts, feelings and beliefs different from one's own","Memorising instructor feedback","A stage of physical development only"], answer:1, note:"Theory of mind is the understanding that other people hold thoughts, feelings and beliefs different from your own, generally developing between ages 3-5."},
{level:1, module:'psych', type:'mc', q:"What is 'cognitive development', as defined in the manual?", options:["An area of development focused on how humans receive and process information","A term for physical fitness only","A synonym for skill acquisition","A stage that only applies to adults"], answer:0, note:"Cognitive development is the area of development that focuses on how humans receive and process information."},
{level:1, module:'psych', type:'mc', q:"What is 'affective development'?", options:["The way emotions, morals and relationships change through childhood","A term for physical coordination","A synonym for cognitive development","How quickly a student learns technical skills"], answer:0, note:"Affective development is the way emotions, morals and relationships change through childhood, controlling how children feel about themselves and interact with others."},
{level:1, module:'psych', type:'mc', q:"During Piaget's Sensory-motor stage, how do infants primarily learn about the world around them?", options:["Through formal instruction","Through their senses — smell, taste, touch, sight and hearing","Through peer feedback only","Through written explanation"], answer:1, note:"During the Sensory-motor stage, children use smell, taste, touch, sight and hearing to learn about the world around them."},
{level:1, module:'psych', type:'mc', q:"What is a common outward sign that a student's needs (e.g. warmth) aren't being met, even if they say they're 'fine'?", options:["Increased talking and excitement","Going quiet and disengaging from the group","Asking more technical questions","Skiing faster than usual"], answer:1, note:"The cold-weather example in the manual describes students going quiet and disengaging when a need like warmth isn't being met, even if they verbally say they're fine."},
{level:2, module:'psych', type:'mc', q:"Piaget's Pre-operational stage covers roughly which age range?", options:["Birth to two years","Two to seven years","Seven to eleven years","Eleven years and up"], answer:1, note:"The Pre-operational stage (two-seven years) is when children begin to verbally, mentally and physically interact more with the world around them."},
{level:2, module:'psych', type:'mc', q:"Which is the first stage of play in a child's development?", options:["Associative and cooperative play","Parallel play","Non-social/solitary play","Reciprocal play"], answer:2, note:"Non-social, or solitary play, comes first — children in early childhood spend most of their time playing on their own."},
{level:2, module:'psych', type:'mc', q:"What is 'emotional self-regulation'?", options:["The ability to change your emotional state to match others or to feel more comfortable in a situation","A synonym for physical development","The ability to always suppress emotion entirely","A skill only adults develop"], answer:0, note:"Emotional self-regulation is the ability to change emotional state to match others or make oneself more comfortable, with a child's perspective moving from internal to external over time."},
{level:2, module:'psych', type:'mc', q:"Theory of mind is generally understood to develop between which ages?", options:["Birth to one year","Three to five years","Ten to twelve years","It only develops in adulthood"], answer:1, note:"Theory of mind generally occurs between three and five years of age."},
{level:3, module:'psych', type:'mc', q:"What is 'empathy', and what does it help a child develop?", options:["The ability to identify with the feelings of another, aiding altruistic and prosocial behaviour","A synonym for theory of mind with no distinction","A stage of physical development","The ability to ignore others' emotions"], answer:0, note:"Empathy is the ability to identify with the feelings of another, which aids the development of altruistic (helpful) and prosocial (socially positive) behaviour."},
{level:3, module:'psych', type:'mc', q:"According to Piaget, in what order do the four stages of cognitive development occur?", options:["Pre-operational, Sensory-motor, Formal-operational, Concrete-operational","Sensory-motor, Pre-operational, Concrete-operational, Formal-operational","Concrete-operational, Formal-operational, Sensory-motor, Pre-operational","The order varies randomly by child"], answer:1, note:"Piaget's stages progress in order: Sensory-motor, Pre-operational, Concrete-operational, then Formal-operational — though children move through them at different rates."},
{level:3, module:'psych', type:'mc', q:"What characterises 'Associative and cooperative play', the later stage of play development?", options:["Children play entirely alone","Children begin to engage with others, sharing and creating games together","Children refuse to interact with peers","It only occurs in children under two"], answer:1, note:"Associative and cooperative play is when children begin to engage with others, sharing and creating games etc. together."},
{level:2, module:'psych', type:'mc', q:"Which factors affect a child's affective (emotional) development besides parenting style?", options:["Only genetics, with no environmental influence","The child's own temperament, alongside parenting style","Only the number of siblings a child has","Affective development is fixed at birth and cannot change"], answer:1, note:"A child's temperament greatly affects their ability to develop skills like empathy and emotional self-regulation, alongside parenting style and environment."},

function setNav({showHome, showModules, crumb}){
  homeBtn.classList.toggle('show', !!showHome);
  modulesBtnNav.classList.toggle('show', !!showModules);
  if(crumb){
    crumbBar.style.display = 'flex';
    crumbBar.innerHTML = crumb;
  } else {
    crumbBar.style.display = 'none';
    crumbBar.innerHTML = '';
  }
}

function questionsUpTo(level, moduleKey){
  return QUESTIONS.filter(q => q.level === level && (moduleKey === 'all' || q.module === moduleKey));
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
